version: "3.9"

networks:
  shared-network:
    external: true

services:
  # -----------------------------
  # RabbitMQ
  # -----------------------------
  rabbitmq:
    image: "rabbitmq:3-management"
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - shared-network

  # -----------------------------
  # Redis
  # -----------------------------
  redis:
    image: "redis:7-alpine"
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  # -----------------------------
  # Workers
  # -----------------------------
  steam-worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: steam-worker
    env_file:
      - ./.env
    environment:
      - NODE_ENV=docker
    volumes:
      - ./workers:/app:cached
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "steam"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped #For some reason fails at first start, loads on second
    networks:
      - shared-network
  
  instantgaming-worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - NODE_ENV=docker
    volumes:
      - ./workers:/app:cached
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "instantgaming"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped #For some reason fails at first start, loads on second
    networks:
      - shared-network
    deploy:
      replicas: 5

  # -----------------------------
  # Backend / API
  # -----------------------------
  gamesfinder-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
    volumes:
      - ./src/GamesFinder.Orchestrator.API:/app/src/GamesFinder.Orchestrator.API:cached
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped # Will fail  until workers are ready. They fail at first start, loads on second so backend also needs restart
    networks:
      - shared-network
